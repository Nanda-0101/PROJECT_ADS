<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEKA Dashboard - Mulai Tes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style_tesmahasiswa.css">
</head>
<body>

<main class="main-content fade-in">
    <header class="top-nav">
        <div class="admin-info">
            <img src="../static/assets/Tes-Mahasiswa.png" alt="Tes">
            <div>
                <h6 class="mb-0 fw-medium">Sesi Tes Kepribadian</h6>
                <small>Jawab Dengan Jujur!</small>
            </div>
        </div>
        <div>
            <button class="logout-btn" id="logoutBtn">Keluar</button>
        </div>
    </header>

    <div class="quiz-card-box rounded-4 overflow-hidden shadow-sm">
        <div class="quiz-body-content p-5">
            <div class="quiz-tracker-centered text-center mb-4" id="questionTracker">
                Soal <span class="fw-bold" id="currentNum">1</span> dari <span class="fw-bold" id="totalNum">5</span>
            </div>

            <div id="quizContainer" class="fade-in-question">
                </div>

            <div class="row align-items-center mt-5 pt-2" id="navigationRow">
                <div class="col-4"></div>
                <div class="col-4 d-flex justify-content-center gap-3">
                    <button class="btn-quiz-nav" id="btnPrev" disabled>Sebelumnya</button>
                    <button class="btn-quiz-nav" id="btnNext">Selanjutnya</button>
                </div>
                <div class="col-4 text-end">
                    <button class="btn-quiz-submit" id="btnSubmit" disabled>Kirim</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const questions = [
        { id: 1, text: "Saya lebih memilih menghabiskan waktu luang sendirian atau bersama beberapa teman dekat daripada pergi ke acara sosial yang ramai." },
        { id: 2, text: "Saat mengerjakan proyek praktikum, saya lebih menyukai perencanaan dan jadwal yang terstruktur matang sejak awal." },
        { id: 3, text: "Dalam mengambil suatu keputusan penting, saya lebih mengandalkan analisis data objektif dan logika dibandingkan perasaan." },
        { id: 4, text: "Saya merasa lebih berenergi dan mendapatkan ide-ide baru setelah melakukan diskusi kelompok besar bersama orang-orang baru." },
        { id: 5, text: "Saya merasa nyaman bekerja di lingkungan yang fleksibel di mana saya bisa mengubah keputusan secara spontan kapan saja." }
    ];

    let currentIdx = 0;
    let answers = new Array(questions.length).fill(null);

    const quizContainer = document.getElementById('quizContainer');
    const currentNum = document.getElementById('currentNum');
    const totalNum = document.getElementById('totalNum');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const btnSubmit = document.getElementById('btnSubmit');

    totalNum.innerText = questions.length;

    function renderQuestion() {
        const currentQ = questions[currentIdx];
        const savedAnswer = answers[currentIdx];

        quizContainer.classList.remove('fade-in-question');
        void quizContainer.offsetWidth; 
        quizContainer.classList.add('fade-in-question');

        quizContainer.innerHTML = `
            <div class="question-box-wrapper p-3 mb-4 shadow-sm">
                <small class="question-label d-block mb-1">PERTANYAAN ${currentQ.id}</small>
                <p class="mb-0 question-text fw-medium">
                    ${currentQ.text}
                </p>
            </div>
            <div class="options-group d-flex flex-column gap-3">
                <label class="option-wrapper p-3 d-flex align-items-center rounded-3 ${savedAnswer === 'SS' ? 'selected' : ''}">
                    <input type="radio" name="quizOption" value="SS" class="me-3 custom-radio" ${savedAnswer === 'SS' ? 'checked' : ''}>
                    <span class="option-text">Sangat Setuju</span>
                </label>
                <label class="option-wrapper p-3 d-flex align-items-center rounded-3 ${savedAnswer === 'S' ? 'selected' : ''}">
                    <input type="radio" name="quizOption" value="S" class="me-3 custom-radio" ${savedAnswer === 'S' ? 'checked' : ''}>
                    <span class="option-text">Setuju</span>
                </label>
                <label class="option-wrapper p-3 d-flex align-items-center rounded-3 ${savedAnswer === 'N' ? 'selected' : ''}">
                    <input type="radio" name="quizOption" value="N" class="me-3 custom-radio" ${savedAnswer === 'N' ? 'checked' : ''}>
                    <span class="option-text">Netral</span>
                </label>
                <label class="option-wrapper p-3 d-flex align-items-center rounded-3 ${savedAnswer === 'TS' ? 'selected' : ''}">
                    <input type="radio" name="quizOption" value="TS" class="me-3 custom-radio" ${savedAnswer === 'TS' ? 'checked' : ''}>
                    <span class="option-text">Tidak Setuju</span>
                </label>
                <label class="option-wrapper p-3 d-flex align-items-center rounded-3 ${savedAnswer === 'STS' ? 'selected' : ''}">
                    <input type="radio" name="quizOption" value="STS" class="me-3 custom-radio" ${savedAnswer === 'STS' ? 'checked' : ''}>
                    <span class="option-text">Sangat Tidak Setuju</span>
                </label>
            </div>
        `;

        currentNum.innerText = currentIdx + 1;
        btnPrev.disabled = currentIdx === 0;
        
        if (currentIdx === questions.length - 1) {
            btnNext.disabled = true;
            checkSubmitStatus();
        } else {
            btnNext.disabled = false;
            btnSubmit.disabled = true;
        }

        const options = document.querySelectorAll('input[name="quizOption"]');
        options.forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('.option-wrapper').forEach(el => el.classList.remove('selected'));
                e.target.closest('.option-wrapper').classList.add('selected');
                answers[currentIdx] = e.target.value;
                
                if (currentIdx === questions.length - 1) {
                    checkSubmitStatus();
                }
            });
        });
    }

    function checkSubmitStatus() {
        const anySelected = document.querySelector('input[name="quizOption"]:checked') || answers[currentIdx] !== null;
        if (currentIdx === questions.length - 1 && anySelected) {
            btnSubmit.disabled = false;
        } else {
            btnSubmit.disabled = true;
        }
    }

    btnNext.addEventListener('click', () => {
        const selectedRadio = document.querySelector('input[name="quizOption"]:checked');
        if (!selectedRadio && answers[currentIdx] === null) {
            alert("Silakan pilih salah satu opsi jawaban sebelum melanjutkan.");
            return;
        }

        if (selectedRadio) { answers[currentIdx] = selectedRadio.value; }

        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        }
    });

    btnPrev.addEventListener('click', () => {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    });

    btnSubmit.addEventListener('click', () => {
        const quizBodyContent = document.querySelector('.quiz-body-content');
        
        quizBodyContent.innerHTML = `
            <div class="success-screen-container text-center py-4 fade-in-question">
                <div class="success-icon-circle mb-4">
                    <span class="material-icons">check_circle</span>
                </div>
                <h3 class="success-title fw-bold mb-2">Tes Selesai!</h3>
                <p class="success-message mx-auto mb-4">
                    Selamat! Anda telah menyelesaikan seluruh soal tes kepribadian.<br>
                    Hasil kuis Anda berhasil direkam ke dalam sistem.
                </p>
                <div class="pt-2">
                    <a href="../DashMhs.html" class="btn-quiz-nav text-decoration-none d-inline-block shadow-sm">
                        Kembali ke Dashboard
                    </a>
                </div>
            </div>
        `;
    });

    renderQuestion();
});
</script>
</body>
</html>
