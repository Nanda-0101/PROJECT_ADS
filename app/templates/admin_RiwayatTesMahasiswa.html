<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEKA - Riwayat Test Mahasiswa - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style_admin.css">
</head>
<body>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content ios-glass-modal">
            <div class="modal-body p-4 text-center">
                <div class="d-flex align-items-center justify-content-center mb-2 text-danger">
                    <i class="material-icons" style="font-size: 32px;">power_settings_new</i>
                </div>
                <h6 class="fw-bold mb-2" style="font-size: 18px; color: #111111; letter-spacing: -0.3px;">Konfirmasi Keluar Sesi</h6>
                <p class="text-muted mb-1" style="font-size: 14px; line-height: 1.45;">Apakah Anda yakin ingin melakukan logout?</p>
            </div>
            <div class="d-flex border-top" style="border-color: rgba(0,0,0,0.1) !important;">
                <button type="button" class="btn w-50 ios-btn-glass text-secondary border-end" data-bs-dismiss="modal" style="border-color: rgba(0,0,0,0.1) !important;">Cancel</button>
                <button type="button" class="btn w-50 ios-btn-glass fw-semibold text-danger" id="confirmLogoutBtn">Logout</button>
            </div>
        </div>
    </div>
</div>

<aside class="sidebar" id="sidebar-container">{% include "admin_Navigasi.html" %}</aside>

<main class="main-content">
    <header class="top-nav">
        <div class="admin-info">
            <img src="../static/assets/Iseng.png" alt="Admin" class="admin-avatar">
            <div>
                <h6 class="mb-0 fw-bold">Selamat datang, Admin Staff FMIPA!</h6>
            </div>
        </div>
        <button class="btn btn-danger logout-btn" id="logoutBtn" style="font-weight: 600; font-size: 14px; padding: 8px 18px; border-radius: 8px;">
    Logout
</button>
    </header>

    <div id="page-riwayat" class="hidden">
        <div class="unified-container">
            <div class="unified-header">Riwayat Tes Mahasiswa</div>
            <table class="table table-unified align-middle" id="riwayatTable">
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th>NIM</th>
                        <th>Nama Mahasiswa</th>
                        <th>Tanggal Tes</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal fade" id="modalDetailTes" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary-blue text-black">
                <h5 class="modal-title text-center w-100 fw-bold">Detail Hasil Tes</h5>
                <button type="button" class="btn-close btn-close-white position-absolute end-0 me-3" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailTesBody"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/script_admin.js?v=20260606"></script>
<script>
    if (window.initAdminShell) {
        window.initAdminShell();
    }
</script>
</body>
</html>
