<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEKA - Riwayat Test Mahasiswa - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style_admin.css">
</head>
<body>

<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Konfirmasi Logout</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Apakah Anda yakin ingin logout?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmLogoutBtn">Logout</button>
      </div>
    </div>
  </div>
</div>

<aside class="sidebar" id="sidebar-container"></aside>

<main class="main-content">
    <header class="top-nav">
        <div class="admin-info">
            <img src="../static/assets/Iseng.png" alt="Admin" class="admin-avatar">
            <div>
                <h6 class="mb-0 fw-bold">Selamat datang, Admin Staff FMIPA!</h6>
                <small id="headerNip">NIP 01293080291372</small>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

    <div id="page-riwayat" class="hidden">
        <div class="unified-container">
            <div class="unified-header">Riwayat Tes Mahasiswa</div>
            <table class="table table-unified align-middle" id="riwayatTable">
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th>NIM</th>
                        <th>Nama Mahasiswa</th>
                        <th>Prodi</th>
                        <th>Tanggal Tes</th>
                        <th style="width: 60px;">Skor</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td class="col-nim">2508561140</td>
                        <td>Anak Agung Nanda Aditya</td>
                        <td>Informatika</td>
                        <td>10 Maret 2025</td>
                        <td>30</td>
                        <td>Introvert</td>
                        <td class="col-aksi">
                            <button type="button" class="btn-detail-riwayat">Detail</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal fade" id="modalDetailTes" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary-blue text-white">
                <h5 class="modal-title">Detail Hasil Tes</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailTesBody"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/script_admin.js"></script>
</body>
</html>
