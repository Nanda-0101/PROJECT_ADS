<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPEKA - Kelola Mahasiswa - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style_admin.css">
</head>
<body>

<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Konfirmasi Logout</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Apakah Anda yakin ingin logout?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmLogoutBtn">Logout</button>
      </div>
    </div>
  </div>
</div>
<aside class="sidebar" id="sidebar-container"></aside>
<main class="main-content">
    <header class="top-nav">
        <div class="admin-info">
            <img src="../static/assets/Iseng.png" alt="Admin" class="admin-avatar">
            <div>
                <h6 class="mb-0 fw-bold">Selamat datang, Admin Staff FMIPA!</h6>
                <small id="headerNip">NIP 01293080291372</small>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </header>

<div class="toast-container position-fixed top-50 start-50 translate-middle p-3">
  <div id="toastSukses" class="toast toast-custom-box align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex p-2">
      <div class="toast-body d-flex align-items-center">
        <span class="material-icons" style="font-size: 24px; color: #22FF70;">check_circle</span>
        <span class="fw-bold" id="toastMessage" style="color: #333; font-size: 15px;">Mahasiswa berhasil ditambahkan!</span>
      </div>
      <button type="button" class="btn-close m-auto me-2" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

    <div id="page-kelola">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <button class="btn btn-primary px-4 d-flex align-items-center gap-2" id="btnTambahMahasiswa">
                <img src="../static/assets/Tambah-Mahasiswa.png" alt="icon" style="width: 20px; height: 20px;">
                <span style="color: #000000; font-weight: 700;">Tambah Mahasiswa</span>
            </button>
        </div>
        <div class="table-container shadow-sm">
    <table class="table align-middle" id="kelolaTable">
        <thead class="thead-custom">
            <tr>
                <th>ID</th>
                <th>NIM</th>
                <th>Nama</th>
                <th style="border-right: none !important;">Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="col-id">001</td>
                <td class="col-nim">2408561140</td>
                <td class="col-nama">Anak Agung Nanda Aditya</td>
                <td class="col-aksi">
                    <div class="d-flex justify-content-center gap-2">
                        <button type="button" class="btn-hapus-custom" onclick="bukaModalHapusStatis(1)">Hapus</button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<div class="modal fade" id="modalTambahMahasiswa" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary-blue text-">
                <h5 class="modal-title w-100 text-center fw-bold">Tambah Mahasiswa Baru</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
    <form id="formTambahMahasiswa">
        <div class="mb-3">
            <label class="form-label small fw-bold">NIM</label>
            <input type="text" class="form-control" id="nimBaru" placeholder="Masukkan NIM Mahasiswa" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Nama Mahasiswa</label>
            <input type="text" class="form-control" id="namaBaru" placeholder="Masukkan Nama Lengkap" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">Kata Sandi</label>
            <input type="password" class="form-control" id="passwordBaru" placeholder="Buat kata sandi akun" required>
        </div>
        <button type="submit" class="btn-save">Simpan</button>
    </form>

    <div id="successBox" class="d-none text-center py-5">
        <span class="material-icons" style="font-size: 60px; color: #22FF70; margin-bottom: 15px;">check_circle</span>
        <h4 class="fw-bold">Berhasil!</h4>
        <p class="text-muted">Mahasiswa baru telah ditambahkan ke sistem.</p>
        <button type="button" class="btn btn-primary mt-3" data-bs-dismiss="modal">Tutup</button>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../static/js/script_admin.js"></script>
</body>
</html>
