<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIPEKA Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT -->
        <div class="col-md-6 left-section">
            <h2 id="title">Halo<br>Mahasiswa FMIPA 👋</h2>

            <p id="desc">
                SIPEKA adalah Sistem Informasi Kepribadian Mahasiswa
                yang dirancang khusus untuk mahasiswa FMIPA
                Universitas Udayana.
            </p>
        </div>

        <!-- RIGHT -->
        <div class="col-md-6 right-section">
            <div class="login-box">

                <h5 id="roleTitle">LOGIN MAHASISWA</h5>

                <h6 class="welcome-text">Selamat Datang!</h6>

                <p class="info-text">
                    Belum punya akun?
                    <a href="https://wa.me/6285792764316"
                       target="_blank"
                       class="bold-text admin-link">
                        Hubungi administrator kampus FMIPA.
                    </a>
                </p>

                <!-- FORM -->
                <form method="POST" action="/login">

                    <!-- INPUT DINAMIS -->
                    <input
                        type="text"
                        class="form-control mb-3"
                        id="usernameInput"
                        name="nim"
                        placeholder="NIM"
                        required
                    >

                    <input
                        type="password"
                        class="form-control mb-3"
                        name="password"
                        placeholder="Kata sandi"
                        required
                    >

                    <!-- ROLE -->
                    <input type="hidden" id="roleInput" name="role" value="mahasiswa">

                    <button type="submit" class="btn btn-login">
                        Login
                    </button>

                </form>

                <p class="admin-text">
                    Anda adalah admin?
                    <span id="toggleRole" class="toggle">
                        Login disini
                    </span>
                </p>

            </div>
        </div>

    </div>
</div>

<script>

    let isAdmin = false;

    const toggleRole = document.getElementById("toggleRole");
    const roleTitle = document.getElementById("roleTitle");
    const usernameInput = document.getElementById("usernameInput");
    const roleInput = document.getElementById("roleInput");
    const title = document.getElementById("title");

    toggleRole.addEventListener("click", () => {

        isAdmin = !isAdmin;

        if (isAdmin) {

            roleTitle.innerText = "LOGIN ADMIN";

            usernameInput.placeholder = "Username";
            usernameInput.name = "username";

            roleInput.value = "admin";

            title.innerHTML = "Halo<br>Admin FMIPA 👨‍💼";

            toggleRole.innerText = "Login mahasiswa";

        } else {

            roleTitle.innerText = "LOGIN MAHASISWA";

            usernameInput.placeholder = "NIM";
            usernameInput.name = "nim";

            roleInput.value = "mahasiswa";

            title.innerHTML = "Halo<br>Mahasiswa FMIPA 👋";

            toggleRole.innerText = "Login disini";
        }

    });

</script>

</body>
</html>
