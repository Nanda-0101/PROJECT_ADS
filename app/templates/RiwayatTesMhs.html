<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Riwayat Tes Mahasiswa - SIPEKA</title>

    <!-- BOOTSTRAP 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- BOOTSTRAP ICON -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="../static/css/DashMhs.css?v=5">

    <link
        rel="stylesheet"
        href="../static/css/RiwayatTesMhs.css">

</head>

<body>

    <!-- MODAL LOGOUT -->
    <div class="modal fade"
         id="logoutModal"
         tabindex="-1"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        Konfirmasi Logout
                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                    </button>

                </div>

                <div class="modal-body">

                    Apakah Anda yakin ingin logout?

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button type="button"
                            class="btn btn-danger"
                            id="confirmLogoutBtn">

                        Logout

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div class="dashboard-shell">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            {% include 'Mahasiswa_Navigasi.html' %}

        </aside>

        <!-- MAIN PANEL -->
        <main class="main-panel">

            <!-- TOP BAR -->
            <div class="top-bar">

                <div class="profile-section">

                    <div class="profile-avatar"></div>

                    <div>

                        <div class="profile-name">

                            Selamat datang, Garland Bramanda!

                        </div>

                        <div class="profile-id">

                            NIM 2408561131

                        </div>

                    </div>

                </div>

                <!-- BUTTON LOGOUT -->
                <button class="btn-logout"
                        id="logoutBtn">

                    Logout

                </button>

            </div>

            <!-- PAGE TITLE -->
            <div class="page-title">

                <h2>Riwayat Tes Mahasiswa</h2>

            </div>

            <!-- CONTENT -->
            <div class="content-area">

            </div>

        </main>

    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCRIPT LOGOUT -->
    <script>

        document.addEventListener(
            "DOMContentLoaded",
            function () {

                console.log("JS Loaded");

                // ambil element
                const logoutBtn =
                    document.getElementById("logoutBtn");

                const confirmLogoutBtn =
                    document.getElementById("confirmLogoutBtn");

                const logoutModalEl =
                    document.getElementById("logoutModal");

                // debug
                console.log(logoutBtn);
                console.log(logoutModalEl);

                // pastikan element ada
                if (
                    logoutBtn &&
                    confirmLogoutBtn &&
                    logoutModalEl
                ) {

                    // inisialisasi modal
                    const logoutModal =
                        new bootstrap.Modal(logoutModalEl);

                    // klik logout
                    logoutBtn.addEventListener(
                        "click",
                        function () {

                            console.log(
                                "Logout clicked"
                            );

                            logoutModal.show();

                        }
                    );

                    // konfirmasi logout
                    confirmLogoutBtn.addEventListener(
                        "click",
                        function () {

                            window.location.href =
                                "/logout";

                        }
                    );

                } else {

                    console.error(
                        "Element logout tidak ditemukan"
                    );

                }

            }
        );

    </script>

</body>

</html>
